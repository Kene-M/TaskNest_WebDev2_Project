@if(posts.length > 0) {
    <mat-accordion>
        <mat-expansion-panel hideToggle *ngFor="let post of posts">
            <mat-expansion-panel-header>
            {{post.title}}
            </mat-expansion-panel-header>
            <p>This is the primary content of the panel for post "{{post.content}}"</p>

            <mat-action-row>
                <a mat-button [routerLink]="['/edit', post.id]">EDIT</a>
                <button mat-button (click)="onDelete(post.id!)">DELETE</button>
            </mat-action-row>
        </mat-expansion-panel>
    </mat-accordion>
}@else {
    <p class="info-text mat-body-1">No post yet</p>
}
