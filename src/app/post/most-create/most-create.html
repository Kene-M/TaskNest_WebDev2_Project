<mat-card>
    <form formGroup="form" (ngSubmit)="onSavePost()">
        <mat-form-field>
            <input 
            matInput 
            type="text" 
            formControlName="title"
            name="title" 
            required>
            @if (form.get("title")?.invalid) {
                <mat-error>Enter Title info</mat-error>
            }
        </mat-form-field>
        <div>
            <button mat-stroked-button (click)="filePicker.click()" type="button">Pick Image</button>
            <input type="file" #filePicker (change)="onImagePicked($event)">
        </div>
        <div class="imagePreview">
            @if (imagePreview) {
                <img [src]="imagePreview" alt="Image Preview">
            } @else {
                <p class="info-text mat-body-1">Please pick an image</p>
            }
        </div>
        
        <mat-form-field>
            <textarea 
            matInput 
            rows="6" 
            name="content" 
            formControlName="content"
            required></textarea>
            @if (form.get("content")?.invalid) {
                <mat-error>Enter in information</mat-error>
            }
        </mat-form-field>

        <button type="submit">Save Post</button>
    </form>
    
</mat-card>
